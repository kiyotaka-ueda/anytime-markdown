name: CI / Publish VS Code Extension

on:
  push:
    branches: [master, develop]
  pull_request:
    branches: [develop, master]

permissions:
  contents: read

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Security audit
        run: npm audit --audit-level=high

      - name: Type check
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint

      - name: Run editor-core tests
        run: npm test
        working-directory: packages/editor-core

      - name: Run web-app tests
        run: npm test
        working-directory: packages/web-app

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
        working-directory: packages/web-app

      - name: Run e2e tests
        run: npm run e2e
        working-directory: packages/web-app

      - name: Build web-app
        run: npx next build
        working-directory: packages/web-app

      - name: Build extension
        run: npm run package
        working-directory: packages/vscode-extension

      - name: Package VSIX
        run: npx vsce package --no-dependencies
        working-directory: packages/vscode-extension

  publish:
    if: github.ref == 'refs/heads/master'
    needs: ci
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get version from package.json
        id: version
        run: echo "version=v$(node -p "require('./packages/vscode-extension/package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Check if tag already exists
        id: tag_check
        run: |
          if git rev-parse "${{ steps.version.outputs.version }}" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Skip if already released
        if: steps.tag_check.outputs.exists == 'true'
        run: echo "Tag ${{ steps.version.outputs.version }} already exists. Skipping release."

      - uses: actions/setup-node@v4
        if: steps.tag_check.outputs.exists == 'false'
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        if: steps.tag_check.outputs.exists == 'false'
        run: npm ci

      - name: Build extension
        if: steps.tag_check.outputs.exists == 'false'
        run: npm run package
        working-directory: packages/vscode-extension

      - name: Package VSIX
        if: steps.tag_check.outputs.exists == 'false'
        run: npx vsce package --no-dependencies
        working-directory: packages/vscode-extension

      - name: Publish to Marketplace
        if: steps.tag_check.outputs.exists == 'false'
        run: npx vsce publish --no-dependencies --pat "$VSCE_PAT"
        working-directory: packages/vscode-extension
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}

      - name: Create git tag
        if: steps.tag_check.outputs.exists == 'false'
        run: |
          git tag ${{ steps.version.outputs.version }}
          git push origin ${{ steps.version.outputs.version }}

      - name: Upload VSIX artifact
        if: steps.tag_check.outputs.exists == 'false'
        uses: actions/upload-artifact@v4
        with:
          name: vsix
          path: packages/vscode-extension/*.vsix
