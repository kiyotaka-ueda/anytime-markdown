name: Cache Cleanup

on:
  schedule:
    # 毎週月曜 UTC 21:00（JST 6:00）に実行
    - cron: '0 21 * * 0'
  workflow_dispatch:

permissions:
  actions: write

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Cleanup stale caches
        uses: actions/github-script@v7
        with:
          script: |
            const caches = await github.rest.actions.getActionsCacheList({
              owner: context.repo.owner,
              repo: context.repo.repo,
              per_page: 100,
            });

            const now = Date.now();
            const sevenDays = 7 * 24 * 60 * 60 * 1000;
            let deleted = 0;

            for (const cache of caches.data.actions_caches) {
              const lastUsed = new Date(cache.last_accessed_at).getTime();
              if (now - lastUsed > sevenDays) {
                await github.rest.actions.deleteActionsCacheById({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  cache_id: cache.id,
                });
                console.log(`Deleted: ${cache.key} (last used: ${cache.last_accessed_at})`);
                deleted++;
              }
            }

            console.log(`Deleted ${deleted} stale caches out of ${caches.data.total_count} total.`);
