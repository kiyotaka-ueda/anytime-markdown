name: Deploy mcp-cms-remote

on:
  push:
    branches: [master]
    paths:
      - 'packages/mcp-cms-remote/**'
      - 'packages/cms-core/**'
      - '.github/workflows/deploy-mcp-cms-remote.yml'
  pull_request:
    branches: [master]
    paths:
      - 'packages/mcp-cms-remote/**'
      - 'packages/cms-core/**'
      - '.github/workflows/deploy-mcp-cms-remote.yml'
  workflow_dispatch:

concurrency:
  group: deploy-mcp-cms-remote-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v6
        with:
          node-version-file: '.node-version'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run cms-core tests
        run: npx jest --maxWorkers=1
        working-directory: packages/cms-core

      - name: Run tests
        run: npx jest --maxWorkers=1
        working-directory: packages/mcp-cms-remote

      - name: Bundle check (dry-run)
        run: npx wrangler deploy --dry-run --outdir=dist 2>&1 | tee bundle-output.txt
        working-directory: packages/mcp-cms-remote

      - name: Show bundle size
        run: grep -E 'Total Upload' bundle-output.txt || true
        working-directory: packages/mcp-cms-remote

  deploy:
    if: github.ref == 'refs/heads/master'
    needs: test
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v6
        with:
          node-version-file: '.node-version'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Set Workers secrets
        working-directory: packages/mcp-cms-remote
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          printf '%s' "${{ secrets.MCP_CMS_REMOTE_API_KEY }}" | npx wrangler secret put MCP_API_KEY 2>/dev/null
          printf '%s' "${{ secrets.ANYTIME_AWS_ACCESS_KEY_ID }}" | npx wrangler secret put ANYTIME_AWS_ACCESS_KEY_ID 2>/dev/null
          printf '%s' "${{ secrets.ANYTIME_AWS_SECRET_ACCESS_KEY }}" | npx wrangler secret put ANYTIME_AWS_SECRET_ACCESS_KEY 2>/dev/null
          printf '%s' "${{ secrets.S3_DOCS_BUCKET }}" | npx wrangler secret put S3_DOCS_BUCKET 2>/dev/null

      - name: Deploy to Cloudflare Workers
        run: npx wrangler deploy
        working-directory: packages/mcp-cms-remote
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
