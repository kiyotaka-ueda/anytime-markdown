name: Daily Build Check

on:
  schedule:
    # 毎日 UTC 20:00（JST 5:00）に実行
    - cron: '0 20 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v6
        with:
          node-version-file: '.node-version'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Security audit
        run: npm audit --audit-level=critical

      - name: Type check
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint

      - name: Run markdown-core tests
        run: npm test
        working-directory: packages/markdown-core

      - name: Run mcp-markdown tests
        run: npx jest --maxWorkers=1
        working-directory: packages/mcp-markdown

      - name: Run graph-core tests with coverage
        run: npx jest --maxWorkers=1 --coverage --coverageReporters=lcov
        working-directory: packages/graph-core

      - name: Run mcp-graph tests
        run: npx jest --maxWorkers=1
        working-directory: packages/mcp-graph

      - name: Run cms-core tests
        run: npx jest --maxWorkers=1
        working-directory: packages/cms-core

      - name: Run mcp-cms tests
        run: npx jest --passWithNoTests --maxWorkers=1
        working-directory: packages/mcp-cms

      - name: Run web-app tests
        run: npm test
        working-directory: packages/web-app

      - name: Build web-app
        run: npx next build | tee build-output.txt
        working-directory: packages/web-app

      - name: Extract bundle size report
        working-directory: packages/web-app
        run: |
          echo "## Bundle Size Report ($(date -u +%Y-%m-%d))" > bundle-report.md
          echo '```' >> bundle-report.md
          grep -E '(^[├└○ƒ\+]|First Load)' build-output.txt >> bundle-report.md || true
          echo '```' >> bundle-report.md
          cat bundle-report.md

      - name: Upload bundle report
        uses: actions/upload-artifact@v4
        with:
          name: bundle-size-report
          path: packages/web-app/bundle-report.md
          retention-days: 30

      - name: Build markdown extension
        run: npm run package
        working-directory: packages/vscode-markdown-extension

      - name: Package markdown VSIX
        run: npx vsce package --no-dependencies
        working-directory: packages/vscode-markdown-extension

      - name: Build graph extension
        run: npm run package
        working-directory: packages/vscode-graph-extension

      - name: Package graph VSIX
        run: npx vsce package --no-dependencies
        working-directory: packages/vscode-graph-extension

      - name: Build git extension
        run: npm run package
        working-directory: packages/vscode-git-extension

      - name: Package git VSIX
        run: npx vsce package --no-dependencies
        working-directory: packages/vscode-git-extension

      - name: Package extension pack VSIX
        run: npx vsce package --no-dependencies
        working-directory: packages/vscode-extension-pack

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium firefox webkit
        working-directory: packages/web-app

      - name: Run e2e tests
        run: xvfb-run npm run e2e
        working-directory: packages/web-app
        env:
          AUTH_SECRET: test-secret-for-ci

  notify-on-failure:
    if: failure()
    needs: [build, codeql, sonarcloud, snyk]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      issues: write
    steps:
      - name: Create failure issue
        uses: actions/github-script@v7
        with:
          script: |
            const title = `Daily Build Failed - ${new Date().toISOString().slice(0, 10)}`;
            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'daily-build-failure',
              per_page: 1
            });
            if (existing.data.length > 0) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.data[0].number,
                body: `Daily build failed again: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body: `Daily build failed.\n\nRun: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
                labels: ['daily-build-failure']
              });
            }

  codeql:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      security-events: write
    steps:
      - uses: actions/checkout@v5

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: javascript-typescript
          queries: security-and-quality

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: daily-build

  sonarcloud:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version-file: '.node-version'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run markdown-core tests with coverage
        run: npx jest --coverage --coverageReporters=lcov
        working-directory: packages/markdown-core

      - name: Run graph-core tests with coverage
        run: npx jest --maxWorkers=1 --coverage --coverageReporters=lcov
        working-directory: packages/graph-core

      - name: Run cms-core tests with coverage
        run: npx jest --maxWorkers=1 --coverage --coverageReporters=lcov
        working-directory: packages/cms-core

      - name: Run web-app tests with coverage
        run: npx jest --coverage --coverageReporters=lcov
        working-directory: packages/web-app

      - name: SonarCloud Scan
        continue-on-error: true
        uses: SonarSource/sonarqube-scan-action@v6
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  snyk:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v6
        with:
          node-version-file: '.node-version'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Snyk Open Source
        continue-on-error: true
        run: npx snyk test --all-projects --sarif-file-output=snyk-os.sarif
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

      - name: Snyk Code (SAST)
        continue-on-error: true
        run: npx snyk code test --sarif-file-output=snyk-code.sarif
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

      - name: Upload Snyk results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: .
          category: snyk
