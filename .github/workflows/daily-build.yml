name: Daily Build Check

on:
  schedule:
    # 毎日 UTC 21:00（JST 6:00）に実行
    - cron: '0 21 * * *'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Security audit
        run: npm audit --audit-level=high

      - name: Type check
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint

      - name: Run editor-core tests
        run: npm test
        working-directory: packages/editor-core

      - name: Run web-app tests
        run: npm test
        working-directory: packages/web-app

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium firefox webkit
        working-directory: packages/web-app

      - name: Run e2e tests
        run: npm run e2e
        working-directory: packages/web-app

      - name: Build web-app
        run: npx next build
        working-directory: packages/web-app

      - name: Build extension
        run: npm run package
        working-directory: packages/vscode-extension

  codeql:
    runs-on: ubuntu-latest
    permissions:
      security-events: write
    steps:
      - uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: javascript-typescript
          queries: security-and-quality

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: daily-build

  sonarcloud:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run editor-core tests with coverage
        run: npx jest --coverage --coverageReporters=lcov
        working-directory: packages/editor-core

      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@v6
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
