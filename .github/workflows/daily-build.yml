name: Daily Build Check

on:
  schedule:
    # 毎日 UTC 21:00（JST 6:00）に実行
    - cron: '0 21 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Security audit
        run: npm audit --audit-level=high

      - name: Type check
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint

      - name: Run editor-core tests
        run: npm test
        working-directory: packages/editor-core

      - name: Run web-app tests
        run: npm test
        working-directory: packages/web-app

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium firefox webkit
        working-directory: packages/web-app

      - name: Run e2e tests
        run: xvfb-run npm run e2e
        working-directory: packages/web-app
        env:
          AUTH_SECRET: test-secret-for-ci

      - name: Build web-app
        run: npx next build | tee build-output.txt
        working-directory: packages/web-app

      - name: Extract bundle size report
        working-directory: packages/web-app
        run: |
          echo "## Bundle Size Report ($(date -u +%Y-%m-%d))" > bundle-report.md
          echo '```' >> bundle-report.md
          grep -E '(^[├└○ƒ\+]|First Load)' build-output.txt >> bundle-report.md || true
          echo '```' >> bundle-report.md
          cat bundle-report.md

      - name: Upload bundle report
        uses: actions/upload-artifact@v4
        with:
          name: bundle-size-report
          path: packages/web-app/bundle-report.md
          retention-days: 30

      - name: Build extension
        run: npm run package
        working-directory: packages/vscode-extension

  codeql:
    runs-on: ubuntu-latest
    permissions:
      security-events: write
    steps:
      - uses: actions/checkout@v5

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: javascript-typescript
          queries: security-and-quality

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: daily-build

  sonarcloud:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run editor-core tests with coverage
        run: npx jest --coverage --coverageReporters=lcov
        working-directory: packages/editor-core

      - name: Run web-app tests with coverage
        run: npx jest --coverage --coverageReporters=lcov
        working-directory: packages/web-app

      - name: SonarCloud Scan
        continue-on-error: true
        uses: SonarSource/sonarqube-scan-action@v6
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
