name: CI / Publish VS Code Extension

on:
  push:
    branches: [develop, master]
  pull_request:
    branches: [develop, master]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Security audit
        run: npm audit --audit-level=high

      - name: Type check
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint

      - name: Run editor-core tests with coverage
        run: npx jest --coverage --coverageReporters=lcov
        working-directory: packages/editor-core

      - name: Run web-app tests with coverage
        run: npx jest --coverage --coverageReporters=lcov
        working-directory: packages/web-app

      - name: SonarCloud Scan
        continue-on-error: true
        uses: SonarSource/sonarqube-scan-action@v6
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      # e2e: develop push → Chromium のみ、master PR / Daily → 3ブラウザ
      - name: Install Playwright browsers
        run: |
          if [ "${{ github.event_name }}" = "push" ] && [ "${{ github.ref }}" = "refs/heads/develop" ]; then
            npx playwright install --with-deps chromium
          else
            npx playwright install --with-deps chromium firefox webkit
          fi
        working-directory: packages/web-app

      - name: Run e2e tests
        run: |
          if [ "${{ github.event_name }}" = "push" ] && [ "${{ github.ref }}" = "refs/heads/develop" ]; then
            xvfb-run npx playwright test --project=chromium
          else
            xvfb-run npm run e2e
          fi
        working-directory: packages/web-app
        env:
          AUTH_SECRET: test-secret-for-ci

      - name: Build web-app
        run: npx next build | tee build-output.txt
        working-directory: packages/web-app

      - name: Extract bundle size report
        if: github.event_name == 'pull_request'
        working-directory: packages/web-app
        run: |
          echo "## Bundle Size Report" > bundle-report.md
          echo '```' >> bundle-report.md
          grep -E '(^[├└○ƒ\+]|First Load)' build-output.txt >> bundle-report.md || true
          echo '```' >> bundle-report.md
          cat bundle-report.md

      - name: Upload bundle report
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: bundle-size-report
          path: packages/web-app/bundle-report.md
          retention-days: 7

      - name: Build extension
        run: npm run package
        working-directory: packages/vscode-extension

      - name: Package VSIX
        run: npx vsce package --no-dependencies
        working-directory: packages/vscode-extension

  publish:
    if: github.ref == 'refs/heads/master'
    needs: ci
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Get version from package.json
        id: version
        run: echo "version=v$(node -p "require('./packages/vscode-extension/package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Check if tag already exists
        id: tag_check
        run: |
          if git rev-parse "${{ steps.version.outputs.version }}" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Skip if already released
        if: steps.tag_check.outputs.exists == 'true'
        run: echo "Tag ${{ steps.version.outputs.version }} already exists. Skipping release."

      - uses: actions/setup-node@v5
        if: steps.tag_check.outputs.exists == 'false'
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        if: steps.tag_check.outputs.exists == 'false'
        run: npm ci

      - name: Build extension
        if: steps.tag_check.outputs.exists == 'false'
        run: npm run package
        working-directory: packages/vscode-extension

      - name: Package VSIX
        if: steps.tag_check.outputs.exists == 'false'
        run: npx vsce package --no-dependencies
        working-directory: packages/vscode-extension

      - name: Publish to Marketplace
        if: steps.tag_check.outputs.exists == 'false'
        run: npx vsce publish --no-dependencies --pat "$VSCE_PAT"
        working-directory: packages/vscode-extension
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}

      - name: Create git tag
        if: steps.tag_check.outputs.exists == 'false'
        run: |
          git tag ${{ steps.version.outputs.version }}
          git push origin ${{ steps.version.outputs.version }}

      - name: Upload VSIX artifact
        if: steps.tag_check.outputs.exists == 'false'
        uses: actions/upload-artifact@v4
        with:
          name: vsix
          path: packages/vscode-extension/*.vsix
